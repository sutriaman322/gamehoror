<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horror Entity</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>

<style>
body {
  background: black;
  overflow: hidden;
}

/* TOMBOL FIX */
#startBtn {
  position: relative;
  z-index: 1000;
}

/* CURSOR FIX */
#cursor {
  position: fixed;
  width: 20px;
  height: 20px;
  border: 2px solid white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none; /* BIAR GA NUTUP KLIK */
  display: none; /* SEMBUNYI DI AWAL */
}

/* ENTITY */
#entityContainer {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.eye {
  width: 120px;
  height: 120px;
  background: white;
  border-radius: 50%;
  position: relative;
}

.pupil {
  width: 40px;
  height: 40px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* TEXT */
.scary-text {
  position: absolute;
  color: red;
  opacity: 0;
}

/* FLASH */
#flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
}

/* FACE */
#face {
  position: fixed;
  inset: 0;
  background: url('https://i.imgur.com/8QfQ7ZL.png') center/cover no-repeat;
  opacity: 0;
  transition: 0.2s;
}

/* JUMPSCARE */
#jumpscare {
  position: fixed;
  inset: 0;
  background: red;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 80px;
  opacity: 0;
}

#jumpscare.active {
  opacity: 1;
}
</style>
</head>

<body>

<!-- START -->
<div id="start" class="flex items-center justify-center h-screen">
  <button id="startBtn" class="bg-red-600 text-white px-6 py-3 rounded">
    ENTER
  </button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">
  <div id="entityContainer">
    <div class="eye">
      <div class="pupil"></div>
    </div>
  </div>

  <div id="textContainer"></div>
  <div id="cursor"></div>
  <div id="flash"></div>
</div>

<div id="face"></div>
<div id="jumpscare">👁️</div>

<script>
const startBtn = document.getElementById('startBtn');
const start = document.getElementById('start');
const game = document.getElementById('game');
const pupil = document.querySelector('.pupil');
const cursor = document.getElementById('cursor');
const textContainer = document.getElementById('textContainer');
const flash = document.getElementById('flash');
const jumpscare = document.getElementById('jumpscare');
const entity = document.getElementById('entityContainer');
const face = document.getElementById('face');

let mouseX = 0;
let mouseY = 0;

/* START FIX */
startBtn.onclick = () => {
  try { Tone.start(); } catch(e) {}

  start.style.display = "none";
  game.style.display = "block";

  cursor.style.display = "block";

  startSequence();
};

/* SUPPORT HP */
startBtn.addEventListener('touchstart', () => {
  startBtn.click();
});

/* CURSOR */
document.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  cursor.style.left = mouseX + 'px';
  cursor.style.top = mouseY + 'px';

  updateEye();
});

/* EYE FOLLOW */
function updateEye() {
  const rect = entity.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;

  const angle = Math.atan2(mouseY - cy, mouseX - cx);
  const dist = 10;

  const x = Math.cos(angle) * dist;
  const y = Math.sin(angle) * dist;

  pupil.style.transform =
    `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
}

/* SEQUENCE */
function startSequence() {
  setTimeout(() => whisper("Aku melihatmu..."), 2000);
  setTimeout(() => flicker(), 4000);
  setTimeout(() => whisper("Jangan mendekat..."), 6000);
  setTimeout(() => glitch(), 8000);
  setTimeout(() => whisper("Kau tidak bisa lari..."), 10000);
  setTimeout(() => finalScare(), 13000);
}

/* TEXT */
function whisper(text) {
  const el = document.createElement('div');
  el.className = 'scary-text';
  el.innerText = text;

  el.style.top = Math.random()*80 + '%';
  el.style.left = Math.random()*80 + '%';

  textContainer.appendChild(el);

  requestAnimationFrame(() => el.style.opacity = 1);

  setTimeout(() => {
    el.remove();
  }, 2000);

  new Tone.NoiseSynth().toDestination().triggerAttackRelease("16n");
}

/* EFFECT */
function flicker() {
  flash.style.opacity = 1;
  setTimeout(() => flash.style.opacity = 0, 100);
}

function glitch() {
  document.body.style.background = "#100000";
}

/* FINAL */
function finalScare() {
  jumpscare.classList.add('active');
  face.style.opacity = 1;

  const scream = new Tone.NoiseSynth().toDestination();
  scream.triggerAttackRelease("8n");

  cursor.style.display = 'none';
}
</script>

</body>
</html>
