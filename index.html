<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DON'T LOOK</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>

<style>
body {
  background: black;
  overflow: hidden;
}

/* BUTTON FIX */
#startBtn {
  position: relative;
  z-index: 1000;
}

/* CURSOR FIX */
#cursor {
  position: fixed;
  width: 20px;
  height: 20px;
  border: 2px solid white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
  display: none;
}

/* ENTITY */
#entity {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.eye {
  width: 120px;
  height: 120px;
  background: white;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
}

.pupil {
  width: 40px;
  height: 40px;
  background: black;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* TEXT */
.scary {
  position: absolute;
  color: red;
  opacity: 0;
  text-shadow: 0 0 10px red;
}

/* FLASH */
#flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
}

/* FACE */
#face {
  position: fixed;
  inset: 0;
  background: url('https://i.imgur.com/8QfQ7ZL.png') center/cover no-repeat;
  opacity: 0;
  z-index: 50;
  transition: 0.2s;
}

/* GLITCH */
.glitch {
  animation: glitch 0.1s infinite;
}
@keyframes glitch {
  0% { transform: translate(0); }
  25% { transform: translate(-5px,5px); }
  50% { transform: translate(5px,-5px); }
  75% { transform: translate(-5px,-5px); }
  100% { transform: translate(0); }
}

/* JUMPSCARE */
#jumpscare {
  position: fixed;
  inset: 0;
  background: red;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 100px;
  opacity: 0;
}

#jumpscare.active {
  opacity: 1;
}
</style>
</head>

<body>

<!-- START -->
<div id="start" class="flex items-center justify-center h-screen">
  <button id="startBtn" class="bg-red-700 px-6 py-3 text-white rounded">
    ENTER
  </button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">
  <div id="entity">
    <div class="eye">
      <div class="pupil"></div>
    </div>
  </div>

  <div id="cursor"></div>
  <div id="flash"></div>
  <div id="text"></div>
</div>

<div id="face"></div>
<div id="jumpscare">👁️</div>

<script>
const startBtn = document.getElementById('startBtn');
const start = document.getElementById('start');
const game = document.getElementById('game');
const pupil = document.querySelector('.pupil');
const cursor = document.getElementById('cursor');
const text = document.getElementById('text');
const flash = document.getElementById('flash');
const face = document.getElementById('face');
const jumpscare = document.getElementById('jumpscare');
const entity = document.getElementById('entity');

let mx=0,my=0;

/* START FIX TOTAL */
function startGameNow() {
  console.log("MASUK GAME"); // debug

  try { Tone.start(); } catch(e){}

  start.style.display="none";
  game.style.display="block";
  cursor.style.display="block";

  sequence();
}

startBtn.addEventListener("click", startGameNow);
startBtn.addEventListener("touchstart", startGameNow);

/* CURSOR */
document.addEventListener('mousemove', e=>{
  mx=e.clientX; my=e.clientY;
  cursor.style.left=mx+"px";
  cursor.style.top=my+"px";
  eye();
});

/* EYE FOLLOW */
function eye(){
  const r=entity.getBoundingClientRect();
  const cx=r.left+r.width/2;
  const cy=r.top+r.height/2;

  const ang=Math.atan2(my-cy,mx-cx);
  const x=Math.cos(ang)*12;
  const y=Math.sin(ang)*12;

  pupil.style.transform=
    `translate(calc(-50%+${x}px),calc(-50%+${y}px))`;
}

/* TEXT */
function whisper(t){
  const el=document.createElement("div");
  el.className="scary";
  el.innerText=t;
  el.style.top=Math.random()*80+"%";
  el.style.left=Math.random()*80+"%";
  text.appendChild(el);

  requestAnimationFrame(()=>el.style.opacity=1);
  setTimeout(()=>el.remove(),2000);

  new Tone.NoiseSynth().toDestination().triggerAttackRelease("16n");
}

/* EFFECT */
function flick(){
  flash.style.opacity=1;
  setTimeout(()=>flash.style.opacity=0,100);
}

/* SEQUENCE */
function sequence(){
  setTimeout(()=>whisper("aku melihatmu"),2000);

  setTimeout(()=>{
    flick();
    document.body.classList.add("glitch");
  },4000);

  setTimeout(()=>whisper("jangan melihat"),6000);

  setTimeout(()=>{
    face.style.opacity=0.3;
  },8000);

  setTimeout(()=>{
    face.style.opacity=1;
  },9000);

  setTimeout(()=>whisper("terlambat"),10000);

  setTimeout(()=>final(),12000);
}

/* FINAL */
function final(){
  document.body.classList.add("glitch");

  jumpscare.classList.add("active");
  face.style.opacity=1;

  const scream=new Tone.NoiseSynth({
    envelope:{attack:0.001,decay:0.5}
  }).toDestination();

  scream.volume.value=15;
  scream.triggerAttackRelease("4n");

  flash.style.opacity=1;
  cursor.style.display="none";
}
</script>

</body>
</html>
